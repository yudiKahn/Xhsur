<ion-content [fullscreen]="true" class="home-content">
  <main class="home-layout">
    <a
      class="home-info-button"
      routerLink="/about"
      [attr.aria-label]="'about.title' | translate"
    >
      <ion-icon name="information"></ion-icon>
    </a>

    <header class="home-hero">
      <img class="home-brand-mark" src="assets/icons/siddur.svg" alt="" />
      <h1>{{ 'app.title' | translate }}</h1>
    </header>

    <section class="preset-group" [attr.aria-label]="'home.choosePrayer' | translate">
      @for (preset of primaryPresets; track trackByPreset($index, preset)) {
        <button class="prayer-card" type="button" (click)="openPreset(preset)">
          <!-- <img class="prayer-card__icon" [src]="getPresetIcon(preset.id)" alt="" /> -->
          <span class="prayer-card__title">{{ preset.titleKey | translate }}</span>
          <span class="prayer-card__chevron" aria-hidden="true">›</span>
        </button>
      }
    </section>

    

    <section class="preset-group secondary" [attr.aria-label]="'home.additionalPrayers' | translate">
      @for (preset of supplementalPresets; track trackByPreset($index, preset)) {
        <button class="prayer-card" type="button" (click)="openPreset(preset)">
          <!-- <img class="prayer-card__icon" [src]="getPresetIcon(preset.id)" alt="" /> -->
          <span class="prayer-card__title">{{ preset.titleKey | translate }}</span>
          <span class="prayer-card__chevron" aria-hidden="true">›</span>
        </button>
      }
    </section>
  </main>
</ion-content>
